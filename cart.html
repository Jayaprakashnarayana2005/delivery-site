<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - FoodieExpress</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-utensils"></i>
                <span>FoodieExpress</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="../index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="cart.html" class="active">Cart <span class="cart-count" id="cartCount">0</span></a>
                <a href="orders.html">My Orders</a>
            </div>
            <div class="nav-auth" id="navAuth"></div>
            <div class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <div style="padding-top: 80px; max-width: 1200px; margin: 0 auto; padding: 80px 2rem 2rem;">
        <h1 class="section-title">Your Cart</h1>
        
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;" id="cartContainer"></div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCheckoutModal()">&times;</span>
            <h2>Checkout</h2>
            <form id="checkoutForm" onsubmit="placeOrder(event)">
                <div class="form-group">
                    <label for="deliveryAddress">Delivery Address</label>
                    <textarea id="deliveryAddress" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label for="paymentMethod">Payment Method</label>
                    <select id="paymentMethod" required>
                        <option value="">Select payment method</option>
                        <option value="cash">Cash on Delivery</option>
                        <option value="card">Credit/Debit Card</option>
                        <option value="upi">UPI</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Place Order</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="../js/main.js"></script>
</body>
</html>
